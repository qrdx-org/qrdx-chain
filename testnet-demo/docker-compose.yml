version: '3.8'

services:
  validator-0:
    image: qrdx-chain:latest
    container_name: qrdx-validator-0
    ports:
      - 30303:30303
      - 8545:8545
      - 8546:8546
    volumes:
      - ./genesis:/genesis:ro
      - ./validators/validator_0.json:/validator.json:ro
      - ./data/validator-0:/data
      - ./config:/config:ro
    environment:
      VALIDATOR_INDEX: 0
      VALIDATOR_KEYSTORE: /validator.json
      GENESIS_FILE: /genesis/genesis.json
      DATA_DIR: /data
      NETWORK_ID: 1337
      RPC_ADDR: 0.0.0.0
      RPC_PORT: 8545
      P2P_PORT: 30303
    command:
      - python
      - -m
      - trinity
      - --data-dir=/data
      - --genesis=/genesis/genesis.json
      - --network-id=1337
      - --rpc
      - --rpc-addr=0.0.0.0
      - --rpc-port=8545
      - --ws
      - --ws-addr=0.0.0.0
      - --ws-port=8546
      - --validator=/validator.json
    networks:
      - qrdx-testnet
    hostname: bootnode
  validator-1:
    image: qrdx-chain:latest
    container_name: qrdx-validator-1
    ports:
      - 30304:30303
      - 8555:8545
      - 8556:8546
    volumes:
      - ./genesis:/genesis:ro
      - ./validators/validator_1.json:/validator.json:ro
      - ./data/validator-1:/data
      - ./config:/config:ro
    environment:
      VALIDATOR_INDEX: 1
      VALIDATOR_KEYSTORE: /validator.json
      GENESIS_FILE: /genesis/genesis.json
      DATA_DIR: /data
      NETWORK_ID: 1337
      RPC_ADDR: 0.0.0.0
      RPC_PORT: 8545
      P2P_PORT: 30303
    command:
      - python
      - -m
      - trinity
      - --data-dir=/data
      - --genesis=/genesis/genesis.json
      - --network-id=1337
      - --rpc
      - --rpc-addr=0.0.0.0
      - --rpc-port=8545
      - --ws
      - --ws-addr=0.0.0.0
      - --ws-port=8546
      - --validator=/validator.json
      - --bootnodes=validator-0:30303
    networks:
      - qrdx-testnet
    depends_on:
      - validator-0
  validator-2:
    image: qrdx-chain:latest
    container_name: qrdx-validator-2
    ports:
      - 30305:30303
      - 8557:8545
      - 8558:8546
    volumes:
      - ./genesis:/genesis:ro
      - ./validators/validator_2.json:/validator.json:ro
      - ./data/validator-2:/data
      - ./config:/config:ro
    environment:
      VALIDATOR_INDEX: 2
      VALIDATOR_KEYSTORE: /validator.json
      GENESIS_FILE: /genesis/genesis.json
      DATA_DIR: /data
      NETWORK_ID: 1337
      RPC_ADDR: 0.0.0.0
      RPC_PORT: 8545
      P2P_PORT: 30303
    command:
      - python
      - -m
      - trinity
      - --data-dir=/data
      - --genesis=/genesis/genesis.json
      - --network-id=1337
      - --rpc
      - --rpc-addr=0.0.0.0
      - --rpc-port=8545
      - --ws
      - --ws-addr=0.0.0.0
      - --ws-port=8546
      - --validator=/validator.json
      - --bootnodes=validator-0:30303
    networks:
      - qrdx-testnet
    depends_on:
      - validator-0
  validator-3:
    image: qrdx-chain:latest
    container_name: qrdx-validator-3
    ports:
      - 30306:30303
      - 8559:8545
      - 8560:8546
    volumes:
      - ./genesis:/genesis:ro
      - ./validators/validator_3.json:/validator.json:ro
      - ./data/validator-3:/data
      - ./config:/config:ro
    environment:
      VALIDATOR_INDEX: 3
      VALIDATOR_KEYSTORE: /validator.json
      GENESIS_FILE: /genesis/genesis.json
      DATA_DIR: /data
      NETWORK_ID: 1337
      RPC_ADDR: 0.0.0.0
      RPC_PORT: 8545
      P2P_PORT: 30303
    command:
      - python
      - -m
      - trinity
      - --data-dir=/data
      - --genesis=/genesis/genesis.json
      - --network-id=1337
      - --rpc
      - --rpc-addr=0.0.0.0
      - --rpc-port=8545
      - --ws
      - --ws-addr=0.0.0.0
      - --ws-port=8546
      - --validator=/validator.json
      - --bootnodes=validator-0:30303
    networks:
      - qrdx-testnet
    depends_on:
      - validator-0

networks:
  qrdx-testnet:
    driver: bridge
